name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - extensions/manifest.json

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build, sign, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: main

      - name: Detect version bump
        id: version
        shell: bash
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          if ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            BEFORE="HEAD^"
          fi

          OLD_VERSION=$(git show "$BEFORE:package.json" 2>/dev/null | node -e 'let d=""; process.stdin.on("data", c => d += c); process.stdin.on("end", () => { if (!d) process.exit(0); console.log(JSON.parse(d).version); });' || true)
          NEW_VERSION=$(node -p 'require("./package.json").version')
          if [ -z "$OLD_VERSION" ] || [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "No package.json version bump detected; skipping release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Detected version bump: $OLD_VERSION -> $NEW_VERSION"
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.version.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        if: steps.version.outputs.publish == 'true'
        run: npm ci

      - name: Sync extension and README versions
        if: steps.version.outputs.publish == 'true'
        run: npm run sync:version

      - name: Commit synced version files
        if: steps.version.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- extensions/manifest.json README.md; then
            echo "Version files already in sync."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extensions/manifest.json README.md
          git commit -m "chore: sync release version ${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Build project and extensions
        if: steps.version.outputs.publish == 'true'
        run: npm run build

      - name: Sign extensions
        if: steps.version.outputs.publish == 'true'
        run: npm run release:firefox
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

      - name: Publish to npm
        if: steps.version.outputs.publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare GitHub release
        if: steps.version.outputs.publish == 'true'
        id: github_release
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="$(git rev-parse --short HEAD)"
          RELEASE_TAG="v${{ steps.version.outputs.version }}-${SHORT_SHA}"
          PREVIOUS_TAG="$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')"
          REPOSITORY_URL="${{ github.server_url }}/${{ github.repository }}"

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG_URL="${REPOSITORY_URL}/compare/${PREVIOUS_TAG}...${RELEASE_TAG}"
          else
            CHANGELOG_URL="${REPOSITORY_URL}/commits/${RELEASE_TAG}"
          fi

          cat > release-notes.md <<EOF
          # v${{ steps.version.outputs.version }}
          See the follow changelog [here](${CHANGELOG_URL}).
          EOF

          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub release
        if: steps.version.outputs.publish == 'true'
        run: gh release create "${{ steps.github_release.outputs.tag }}" --target "$(git rev-parse HEAD)" --title "v${{ steps.version.outputs.version }}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
